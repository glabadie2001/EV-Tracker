<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>EV Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <label>Pokemon</label>
        <input type="text" id="add-pokemon">
        <button id="add-pokemon-btn">Add</button>

        <div id="pokemon-list"></div>

        <div class="ev-row">
            <h4>HP:</h4>
            <div class="ev-controls">
                <input id="hp">
                <button onclick="add('hp', 1)">+1</button>
                <button onclick="add('hp', 2)">+2</button>
                <button onclick="add('hp', 3)">+3</button>
            </div>
        </div>
        <div class="ev-row">
            <h4>Attack:</h4>
            <div class="ev-controls">
                <input id="atk">
                <button onclick="add('atk', 1)">+1</button>
                <button onclick="add('atk', 2)">+2</button>
                <button onclick="add('atk', 3)">+3</button>
            </div>
        </div>
        <div class="ev-row">
            <h4>Defense:</h4>
            <div class="ev-controls">
                <input id="def">
                <button onclick="add('def', 1)">+1</button>
                <button onclick="add('def', 2)">+2</button>
                <button onclick="add('def', 3)">+3</button>
            </div>
        </div>
        <div class="ev-row">
            <h4>Special Attack:</h4>
            <div class="ev-controls">
                <input id="satk">
                <button onclick="add('satk', 1)">+1</button>
                <button onclick="add('satk', 2)">+2</button>
                <button onclick="add('satk', 3)">+3</button>
            </div>
        </div>
        <div class="ev-row">
            <h4>Special Defense:</h4>
            <div class="ev-controls">
                <input id="sdef">
                <button onclick="add('sdef', 1)">+1</button>
                <button onclick="add('sdef', 2)">+2</button>
                <button onclick="add('sdef', 3)">+3</button>
            </div>
        </div>
        <div class="ev-row">
            <h4>Speed:</h4>
            <div class="ev-controls">
                <input id="spd">
                <button onclick="add('spd', 1)">+1</button>
                <button onclick="add('spd', 2)">+2</button>
                <button onclick="add('spd', 3)">+3</button>
            </div>
        </div>

        <p id="total"></p>
        <button id="export">Export</button>

        <div id="import-area">
            <input type="text" id="import-code" placeholder="Paste export code">
            <button id="import-btn">Import</button>
        </div>
    </body>

    <script src="script.js"></script>
</html>
